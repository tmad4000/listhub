{% extends "base.html" %}
{% block title %}Edit: {{ file_path }} — Directory — ListHub{% endblock %}
{% block content %}
<div class="toolbar">
    <div class="directory-breadcrumbs">
        <a href="{{ url_for('views.directory') }}">Directory</a>
        <span style="color: var(--text-muted);"> / </span>
        <span>Editing: <code>{{ file_path }}</code></span>
    </div>
</div>

<form method="post" class="edit-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div style="margin-bottom: 12px;">
        <label for="content" style="font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 4px;">Content (Markdown)</label>
        <textarea id="content" name="content" rows="24" style="width: 100%; font-family: var(--font-mono, 'SF Mono', Monaco, Consolas, monospace); font-size: 14px; padding: 12px; background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); resize: vertical; line-height: 1.5;">{{ content }}</textarea>
    </div>

    <div style="display: flex; gap: 12px; align-items: center;">
        <input type="text" name="message" placeholder="Commit message (optional)" style="flex: 1; padding: 8px 12px; background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('views.directory', subpath=subpath) }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
